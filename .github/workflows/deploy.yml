name: Deploy to Podman Server

on:
  push:
    branches: [ main, deploy ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: |
          ssh -o StrictHostKeyChecking=yes ${{ secrets.USER }}@${{ secrets.HOST }} 'bash -s' <<'EOF'
            set -euo pipefail

            APP_DIR="/opt/mern/koperasi"

            cd "$APP_DIR" || {
              echo "Repo not found, cloning..."
              git clone ${{ secrets.REPO_SSH_URL }} "$APP_DIR"
              cd "$APP_DIR"
            }

            BRANCH="${{ github.ref_name }}"
            [ -n "$BRANCH" ] || BRANCH="main"
            git_safe() {
              git -c safe.directory="$APP_DIR" "$@"
            }
            git_safe fetch --all --prune
            git_safe checkout "$BRANCH" || git_safe checkout main
            git_safe reset --hard "origin/$BRANCH" || git_safe reset --hard origin/main

            echo "📦 Backend"
            cd "$APP_DIR/server"

            # Persistent uploads directory on host
            UPLOADS_HOST_DIR="$APP_DIR/server/uploads"
            mkdir -p \
              "$UPLOADS_HOST_DIR/simpanan" \
              "$UPLOADS_HOST_DIR/pinjaman" \
              "$UPLOADS_HOST_DIR/transactions" \
              "$UPLOADS_HOST_DIR/expenses" \
              "$UPLOADS_HOST_DIR/expense-payment-proofs"

            podman build --pull-always --no-cache -t koperasi-api:latest .
            podman stop api || true
            podman rm api || true

            # Mount uploads volume so files survive container recreation
            API_CONTAINER_ID=$(podman run -d --name api --network host \
              --env-file .env \
              -e UPLOADS_DIR="/data/uploads" \
              -v "$UPLOADS_HOST_DIR:/data/uploads:Z" \
              koperasi-api)
            echo "$API_CONTAINER_ID"

            sleep 5
            if ! podman ps --format '{{.Names}}' | grep -qx api; then
              echo "❌ API container stopped after deploy. Last logs:"
              podman logs --tail=200 api || true
              exit 1
            fi

            echo "⚛ Frontend"
            cd "$APP_DIR/client"

            # Opsional tapi membantu kalau pernah ada kasus port forwarding nyangkut
            # podman network reload || true

            podman build --pull-always --no-cache -t koperasi-web:latest .
            podman stop web || true
            podman rm web || true
            podman run -d \
              --replace \
              --name web \
              -p 3000:80 \
              koperasi-web:latest

            echo "🔁 Nginx reload (kalau kamu memang pakai nginx di host)"
            sudo -n systemctl reload nginx || echo "skip reload (no change / not needed)"

            echo "✅ Done. Running containers:"
            podman ps
          EOF
